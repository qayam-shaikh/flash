<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Profile – FlashSale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">⚡ FlashSale</a>
      <span class="tagline">Limited stock · Real-time updates</span>
      <nav class="nav-links">
        <a href="/" class="nav-link">Shop</a>
        <a href="/profile" class="nav-link">My Profile</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="profile-card">
      <div class="profile-header">
        <div class="profile-avatar">Q</div>
        <div class="profile-info">
          <h1>Qayam Shaikh</h1>
          <p>DevOps Engineer · Premium Member</p>
        </div>
      </div>
      
      <div class="profile-details">
        <h3>Account Settings</h3>
        <p><strong>Email:</strong> qayam@example.com</p>
        <p><strong>Location:</strong> Mumbai, India</p>
        <p><strong>Member Since:</strong> May 2026</p>
      </div>

      <a href="/" class="back-link">← Back to Shop</a>
    </div>
  </main>

  <footer class="site-footer">
    <p>FlashSale &copy; 2026 &nbsp;·&nbsp; User Profile Page</p>
  </footer>
</body>
</html>
